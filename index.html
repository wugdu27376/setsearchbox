<script>
    (function() {
        var links = [
            'https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css',
            'https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.css',
            'https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.css',
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css',
            'https://unpkg.com/font-awesome@4.7.0/css/font-awesome.css'
        ];
        
        var currentIndex = 0;
        var head = document.getElementsByTagName('head')[0];
        var loadedSuccessfully = false;  // 【修改位置】添加加载成功标记
        var timeoutId = null;  // 【修改位置】保存超时ID以便清除
        
        function loadCSS(url) {
            if (loadedSuccessfully) return;  // 【修改位置】已加载成功则直接返回
            
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.type = 'text/css';
            link.href = url;
            
            // 清除之前的超时
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            // 兼容 Chrome 7 及低版本浏览器的加载检测
            var img = document.createElement('img');
            img.onerror = function() {
                if (!loadedSuccessfully) {  // 【修改位置】仅当未成功时才尝试下一个
                    currentIndex++;
                    if (currentIndex < links.length) {
                        loadCSS(links[currentIndex]);
                    }
                }
            };
            img.src = url;
            
            // 使用 setTimeout 检测加载失败（兼容不支持 onerror 的浏览器）
            timeoutId = setTimeout(function() {
                if (!loadedSuccessfully && !link.sheet && !link.styleSheet) {  // 【修改位置】仅当未成功时才尝试下一个
                    currentIndex++;
                    if (currentIndex < links.length) {
                        loadCSS(links[currentIndex]);
                    }
                }
                timeoutId = null;
            }, 3000);
            
            // 添加到 head
            if (head) {
                head.appendChild(link);
            } else {
                document.body.appendChild(link);
            }
            
            // 清理超时并标记加载成功
            link.onload = link.onreadystatechange = function() {
                if (!this.readyState || this.readyState === 'loaded' || this.readyState === 'complete') {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                        timeoutId = null;
                    }
                    loadedSuccessfully = true;  // 【修改位置】标记加载成功，阻止后续备用链接加载
                }
            };
        }
        
        // 开始加载第一个链接
        if (links.length > 0) {
            loadCSS(links[0]);
        }
    })();
</script>
